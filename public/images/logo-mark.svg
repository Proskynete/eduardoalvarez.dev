<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Eduardo Álvarez logo mark">
  <!-- Connecting lines -->
  <line x1="32" y1="10" x2="14" y2="50" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="10" x2="50" y2="50" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="50" x2="50" y2="50" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <!-- Top node (leader — slightly larger) -->
  <circle cx="32" cy="10" r="5" stroke="#06b6d4" stroke-width="2"/>
  <!-- Bottom-left node -->
  <circle cx="14" cy="50" r="4" stroke="#06b6d4" stroke-width="2"/>
  <!-- Bottom-right node -->
  <circle cx="50" cy="50" r="4" stroke="#06b6d4" stroke-width="2"/>
</svg>
