name: "Typos"

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  typos:
    name: Spell Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Check for Typos
        uses: crate-ci/typos@v1.44.0
        with:
          files: ./src ./tests
